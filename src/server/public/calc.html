<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora API</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .card {
      width: 320px;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      cursor: pointer;
      border: none;
      background: black;
      color: white;
      font-weight: bold;
    }

    #result {
      text-align: center;
      font-size: 18px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Calculadora</h1>

    <input type="number" id="x" placeholder="Digite X" />
    <input type="number" id="y" placeholder="Digite Y" />
    <button id="calcBtn">Calcular</button>

    <div id="result">Resultado: -</div>
  </div>

  <script>
    const btn = document.getElementById('calcBtn');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const x = parseInt(document.getElementById('x').value, 10);
      const y = parseInt(document.getElementById('y').value, 10);

      if (Number.isNaN(x) || Number.isNaN(y)) {
        result.textContent = 'Digite números inteiros válidos';
        return;
      }

      try {
        const response = await fetch('/sum', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ x, y })
        });

        const data = await response.text();
        result.textContent = `Resultado: ${data}`;
      } catch (err) {
        result.textContent = 'Erro ao chamar API';
        console.error(err);
      }
    });
  </script>
</body>
</html>
